# Release workflow - builds for Linux aarch64 (ARM64)
# Uses Ubuntu 22.04 (glibc 2.35) cross-compilation for compatibility with Debian 12 (glibc 2.36)

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-aarch64:
    name: Build Linux (aarch64)
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust with aarch64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Add arm64 architecture
        run: |
          sudo dpkg --add-architecture arm64
          # Some repo components may be unavailable for arm64, just ignore errors
          sudo apt-get update || true

      - name: Install dependencies
        run: |
          sudo apt-get install -y crossbuild-essential-arm64 pkg-config
          # Install arm64 development packages
          sudo apt-get install -y libgtk-3-dev:arm64 libxcb-shape0-dev:arm64 libxcb-xfixes0-dev:arm64 libfontconfig1-dev:arm64 || true
          # If the above fails, try installing from ports
          sudo apt-get install -y libgtk-3-dev-cross-arm64 libfontconfig1-dev-cross-arm64
          sudo apt-get install -y libxcb-shape0-dev-cross-arm64 libxcb-xfixes0-dev-cross-arm64

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release
        env:
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Create release archive
        run: |
          mkdir release
          cp target/aarch64-unknown-linux-gnu/release/ferrite release/
          tar -czvf ferrite-linux-aarch64.tar.gz -C release .

      - name: Build .deb package (Debian/Ubuntu)
        run: cargo deb --no-build --target aarch64-unknown-linux-gnu

      - name: Copy packages to workspace root
        run: |
          cp target/debian/*.deb ./ferrite-editor_arm64.deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Ferrite ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ferrite-linux-aarch64.tar.gz
            ferrite-editor_arm64.deb
