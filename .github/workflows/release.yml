# Release workflow - builds for Linux aarch64 (ARM64)
# Uses cross-rs/cross with Docker for reliable cross-compilation

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-aarch64:
    name: Build Linux (aarch64)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cross
        run: cargo install cross

      - name: Install cargo-deb (for packaging)
        run: cargo install cargo-deb

      - name: Build release binary using cross
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Package .deb using cargo deb
        run: cargo deb --no-build --target aarch64-unknown-linux-gnu

      - name: Create release archive
        run: |
          mkdir release
          cp target/aarch64-unknown-linux-gnu/release/ferrite release/
          tar -czvf ferrite-linux-aarch64.tar.gz -C release .

      - name: Copy deb package
        run: cp target/debian/*.deb ./ferrite-editor_arm64.deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Ferrite ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ferrite-linux-aarch64.tar.gz
            ferrite-editor_arm64.deb
