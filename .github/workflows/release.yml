# Release workflow - builds for Linux aarch64 (ARM64)

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-aarch64:
    name: Build Linux (aarch64)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build using cross
        uses: dtolnay/cross-cache@v1
        with:
          target: aarch64-unknown-linux-gnu
          args: --release

      - name: Install cargo-deb
        run: |
          cargo install cargo-deb

      - name: Create release archive
        run: |
          mkdir release
          cp target/aarch64-unknown-linux-gnu/release/ferrite release/
          tar -czvf ferrite-linux-aarch64.tar.gz -C release .

      - name: Build .deb package (Debian/Ubuntu)
        run: cargo deb --no-build --target aarch64-unknown-linux-gnu

      - name: Copy packages to workspace root
        run: |
          cp target/debian/*.deb ./ferrite-editor_arm64.deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Ferrite ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ferrite-linux-aarch64.tar.gz
            ferrite-editor_arm64.deb
