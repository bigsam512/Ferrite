# Release workflow - builds and publishes when a version tag is pushed
# Usage: git tag v0.1.0 && git push --tags
#
# This workflow builds for Linux aarch64 (ARM64) and creates a GitHub release.

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-aarch64:
    name: Build Linux (aarch64)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-shape0-dev libxcb-xfixes0-dev libfontconfig1-dev crossbuild-essential-arm64

      - name: Install Rust with aarch64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cargo-deb
        run: |
          cargo install cargo-deb

      - name: Build release
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Create release archive
        run: |
          mkdir release
          cp target/aarch64-unknown-linux-gnu/release/ferrite release/
          tar -czvf ferrite-linux-aarch64.tar.gz -C release .

      - name: Build .deb package (Debian/Ubuntu)
        run: cargo deb --no-build --target aarch64-unknown-linux-gnu

      - name: Copy packages to workspace root
        run: |
          cp target/debian/*.deb ./ferrite-editor_arm64.deb

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrite-linux-aarch64
          path: ferrite-linux-aarch64.tar.gz

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrite-linux-deb
          path: ferrite-editor_arm64.deb

  # Create GitHub Release with aarch64 artifact
  release:
    name: Create Release
    needs: [build-linux-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download Linux aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ferrite-linux-aarch64

      - name: Download Linux .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: ferrite-linux-deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Ferrite ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ferrite-linux-aarch64.tar.gz
            ferrite-editor_arm64.deb
