# Release workflow - builds and publishes when a version tag is pushed
# Usage: git tag v0.1.0 && git push --tags
#
# This workflow builds for Linux aarch64 (ARM64) and creates a GitHub release.

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-aarch64:
    name: Build Linux (aarch64)
    runs-on: ubuntu-24.04-arm
    # Use native ARM64 GitHub hosted runner
    permissions:
      contents: write

    strategy:
      matrix:
        arch: [arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-shape0-dev libxcb-xfixes0-dev libfontconfig1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: |
          cargo install cargo-deb

      - name: Build release
        run: cargo build --release

      - name: Create release archive
        run: |
          mkdir release
          cp target/release/ferrite release/
          tar -czvf ferrite-linux-aarch64.tar.gz -C release .

      - name: Build .deb package (Debian/Ubuntu)
        run: cargo deb --no-build --target aarch64-unknown-linux-gnu

      - name: Copy packages to workspace root
        run: |
          cp target/debian/*.deb ./ferrite-editor_arm64.deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Ferrite ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ferrite-linux-aarch64.tar.gz
            ferrite-editor_arm64.deb
